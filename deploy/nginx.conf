# =============================================================
# ONTOS Rule Engine · nginx 反代配置
# 在容器里挂到 /etc/nginx/conf.d/ontos-rule.conf
# 监听 80，对外由 compose 映射成 host 19091
# =============================================================

server {
    listen       80;
    server_name  _;

    # 字符集
    charset utf-8;

    # 客户端最大 body 大小（注册数据源 / 上传规则有时会大一点）
    client_max_body_size 8m;

    # 通用安全 header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/ontos.access.log;
    error_log  /var/log/nginx/ontos.error.log warn;

    # ------------- API 反代 -------------
    # 前端 axios 用 baseURL='/api'，全部走这里到后端
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 透传调用方标识（前端默认会带 src-rule-web；CLI 用户可自带）
        proxy_pass_request_headers on;

        # 给批量执行留够时间
        proxy_connect_timeout 5s;
        proxy_send_timeout   120s;
        proxy_read_timeout   120s;

        # 关闭缓冲，让大响应流式回去
        proxy_buffering off;
    }

    # ------------- H2 Console（默认屏蔽） -------------
    # 想暴露的话取消注释 + 在 application.yml 里把 web-allow-others 改 true
    # location /h2-console/ {
    #     proxy_pass http://backend:8080;
    #     proxy_set_header Host $host;
    # }

    # ------------- Vue 静态资源 -------------
    # SPA：所有未命中的路径都回 index.html，由 vue-router 客户端接管
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # 静态资源带 hash 的可以长缓存
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        try_files $uri $uri/ /index.html;
    }

    # 简单的健康检查路径，给 nginx 自己用
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
