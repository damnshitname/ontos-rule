name: 🐛 Bug Report
description: 报告一个 bug
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提 bug。请尽量给出可复现的信息，否则我们可能没法定位。

  - type: textarea
    id: summary
    attributes:
      label: 描述
      description: 一两句话说清楚是什么问题
      placeholder: 在 SqlBackend 跑 `matches(...)` 翻译为 Hive SQL 时报 ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: 最小代码 / curl / 步骤
      placeholder: |
        1. 启动 ontos-rule-business
        2. 注册一个 Hive 数据源 ...
        3. 调用 POST /api/rules/.../execute ...
        4. 观察响应 500
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 日志 / 异常栈 / 错误响应都贴出来
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本 / commit
      placeholder: "0.1.0-SNAPSHOT or commit hash"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: 环境
      placeholder: "JDK 21.0.4 · Windows 11 · Maven 3.9.9"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我搜过 issue 没有重复
          required: true
        - label: 我看过 docs/usage.md 的"常见报错排查"
          required: true
