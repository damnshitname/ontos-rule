name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =========================
  # Backend (core + business)
  # =========================
  backend:
    name: Backend · JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21']

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Show versions
        run: |
          java -version
          mvn -v

      - name: Build (skip tests)
        run: mvn -B -ntp -DskipTests clean install

      - name: Run tests
        run: mvn -B -ntp test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/**'
          retention-days: 7

  # =========================
  # Frontend (web)
  # =========================
  frontend:
    name: Frontend · Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20']
    defaults:
      run:
        working-directory: ontos-rule-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: ontos-rule-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Upload dist on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ontos-rule-web/dist
          retention-days: 7
